<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Kinder-Hoerspiele</title>
    <script>
      const pathSegmentsToKeep = 1
      const { location } = window
      const redirectTarget = `${location.protocol}//${location.hostname}${location.port ? `:${location.port}` : ''}${location.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/')}/?/${location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')}${location.search
        .replace(/&/g, '~and~')}${location.hash}`

      location.replace(redirectTarget)
    </script>
  </head>
  <body></body>
</html>
